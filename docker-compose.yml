services:
  web:
    build:
      context: .
      target: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    env_file: .env.local
    environment:
      WATCHPACK_POLLING: "true"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env.local
    restart: unless-stopped

volumes:
  node_modules:
  next_cache:
